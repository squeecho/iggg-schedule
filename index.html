<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>공사 일정표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#f2f0eb;--sf:#fff;--bd:#e0dbd2;--bmd:#ccc7bc;--tx:#18170f;--mu:#7a7870;--mu2:#b5b0a8;
--bar:#cbd5e1;--barh:#94a3b8;--al:#eef2fd;
--sc:rgba(255,60,60,.07);--sh:#fde8e8;--ac:rgba(60,100,255,.07);--ah:#e4eaff;
--hc:rgba(255,140,0,.10);--hh:#fff3cd;
--hd:#1a1916;--ht:#f2f0eb;--rd:#dc2626;--gn:#86efac;--am:#b45309;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);}
.tb{background:var(--hd);color:var(--ht);padding:0 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:500;height:52px;}
.lg{display:flex;align-items:center;flex-shrink:0;}.lg img{height:28px;width:auto;display:block;}
.tb-div{width:1px;height:28px;background:rgba(255,255,255,.18);flex-shrink:0;}
.tb-center{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:1px;}
.tb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);line-height:1;}
.tb-site{font-size:15px;font-weight:900;letter-spacing:-.5px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.tb-site em{color:var(--bar);font-style:normal;}
/* pnm removed */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;border:1.5px solid;white-space:nowrap;transition:all .14s;}
.bg2{border-color:#444;background:transparent;color:#ccc;}.bg2:hover{border-color:#aaa;color:#fff;}
.bb{border-color:var(--bar);background:var(--bar);color:#fff;}.bb:hover{background:var(--barh);}
.bo{border-color:var(--bar);background:transparent;color:var(--bar);}.bo:hover{background:var(--al);}
.bp{border-color:var(--am);background:var(--am);color:#fff;}.bp:hover{background:#92400e;}
.bs2{border-color:var(--gn);background:var(--gn);color:#fff;}.bs2:hover{background:#047857;}
.tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--bd);position:sticky;top:47px;z-index:400;}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:700;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-2px;}
.tab.on{color:var(--bar);border-bottom-color:var(--bar);}
.pg{display:none;}.pg.on{display:block;}
/* EDIT */
.ep{padding:14px 14px 90px;}
.cd{background:var(--sf);border-radius:12px;border:1.5px solid var(--bd);padding:16px;margin-bottom:14px;}
.sl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;}
.fr{display:flex;gap:10px;flex-wrap:wrap;}
.ff{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.ff.fu{min-width:100%;flex-basis:100%;}
.ff label{font-size:11px;font-weight:700;color:var(--mu);}
.fi{border:1.5px solid var(--bd);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);outline:none;transition:border-color .14s;width:100%;}
.fi:focus{border-color:var(--bar);background:#fff;}
.db{display:inline-flex;align-items:center;gap:6px;background:#eef2fd;border:1.5px solid #c7d5f8;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--bar);font-family:'DM Mono',monospace;margin-top:2px;}
.db span{font-size:11px;font-weight:400;color:var(--mu);}
/* recent projects */
.pn-wrap{position:relative;width:100%;}
.pn-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--bar);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:600;margin-top:4px;overflow:hidden;max-height:220px;overflow-y:auto;}
.pn-drop-head{padding:8px 12px;font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;background:#f7f5f0;border-bottom:1px solid var(--bd);}
.pn-item{padding:11px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--bd);transition:background .1s;}
.pn-item:last-child{border-bottom:none;}
.pn-item:hover{background:var(--al);}
.pn-item-nm{font-size:14px;font-weight:600;}
.pn-item-dt{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;white-space:nowrap;}
.pn-item-del{border:none;background:none;color:var(--mu2);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
.pn-item-del:hover{color:var(--rd);}
.pn-row{display:flex;gap:0;width:100%;}
.pn-row .fi{border-radius:8px 0 0 8px;flex:1;}
.pnsb{padding:0 18px;background:var(--bar);color:#fff;border:1.5px solid var(--bar);border-left:none;border-radius:0 8px 8px 0;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .14s;flex-shrink:0;}
.pnsb:hover{background:var(--barh);}
.pnsb.ok{background:var(--gn);border-color:var(--gn);}
.pnchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pnchip{display:inline-flex;align-items:center;gap:0;background:#fff;border:1.5px solid var(--bd);border-radius:30px;overflow:hidden;transition:border-color .14s;}
.pnchip.active{background:#1e293b;border-color:#1e293b;}
.pnchip.active .pnchip-nm{color:#fff;}
.pnchip.active .pnchip-del{color:rgba(255,255,255,.6);}
.pnchip:hover{border-color:var(--bar);}
.pnchip-nm{font-size:13px;font-weight:700;color:var(--tx);padding:7px 10px 7px 14px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.pnchip-del{border:none;border-left:1px solid var(--bd);background:transparent;color:var(--mu2);cursor:pointer;font-size:12px;font-weight:900;padding:7px 10px;line-height:1;flex-shrink:0;}
.pnchip-del:hover{background:#fee2e2;color:var(--rd);}
/* tasks */
.tl{display:flex;flex-direction:column;gap:10px;}
.tc{background:var(--sf);border-radius:12px;border:1.5px solid var(--bd);overflow:hidden;}
.tc.off{opacity:.52;}
.th2{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;}
.tn{width:24px;height:24px;border-radius:50%;background:var(--bar);color:#fff;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tc.off .tn{background:var(--mu2);}
.ti{flex:1;min-width:0;overflow:hidden;}
.tnm{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr2{font-size:11px;font-family:'DM Mono',monospace;color:var(--bar);font-weight:500;text-align:right;margin-left:6px;white-space:nowrap;flex-shrink:0;}
.tc.off .tr2{color:var(--mu2);}
.tv{font-size:11px;color:var(--mu2);transition:transform .2s;margin-left:4px;flex-shrink:0;}
.tv.op{transform:rotate(180deg);}
.tbd{border-top:1.5px solid var(--bd);padding:14px;display:none;flex-direction:column;gap:12px;}
.tbd.op{display:flex;}
.togr{display:flex;align-items:center;justify-content:space-between;padding:2px 0;}
.togr span{font-size:13px;font-weight:600;}
.tog{width:46px;height:26px;border-radius:13px;background:#d1d5db;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--bar);}
.tk2{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;}
.tog.on .tk2{transform:translateX(20px);}
.dp{display:flex;gap:8px;}
.dp .ff{flex:1;}
.dp .fi{font-size:13px;padding:9px 10px;}
.ab{display:inline-block;background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:2px;}
.split-divider{font-size:11px;font-weight:700;color:var(--bar);letter-spacing:.5px;text-transform:uppercase;padding:4px 0;border-top:1px dashed var(--bd);margin-top:2px;}
.auto-date-row{display:flex;align-items:center;gap:8px;}
.auto-date-row .fi{flex:1;}
.auto-btn{padding:6px 10px;border:1.5px solid var(--gn);border-radius:7px;background:none;font-size:11px;color:var(--gn);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;white-space:nowrap;flex-shrink:0;}
.auto-btn:hover{background:#dcfce7;}
/* notes */
.nt{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
.nt th{background:#f0ede6;padding:7px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px;border-bottom:2px solid var(--bd);}
.nt td{padding:7px 8px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.nt tr:last-child td{border-bottom:none;}
.ni{border:1.5px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);outline:none;width:100%;}
.ni:focus{border-color:var(--bar);background:#fff;}
.nd{border:none;background:none;color:var(--mu2);cursor:pointer;font-size:16px;padding:0 4px;}
.nd:hover{color:var(--rd);}
.na{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1.5px dashed var(--bmd);border-radius:8px;background:none;font-size:12px;color:var(--mu);cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;width:100%;}
.na:hover{border-color:var(--bar);color:var(--bar);}
.cta{position:fixed;bottom:0;left:0;right:0;padding:12px 14px;background:var(--sf);border-top:1.5px solid var(--bd);display:flex;gap:8px;z-index:300;}
.cta .btn{flex:1;justify-content:center;padding:13px;font-size:14px;}
/* CHART */
.cp{padding:12px 12px 30px;}
.ca{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cw{background:var(--sf);border-radius:0;border:2px solid #b8b2a8;overflow:hidden;}
.cs{overflow-x:auto;}
.gt{border-collapse:collapse;table-layout:fixed;}
.gt th,.gt td{border-right:1px solid rgba(0,0,0,.06);border-bottom:1px solid var(--bd);}
.gt tbody tr:last-child td{border-bottom:none;}
.sc{position:sticky;z-index:5;}
.s1{left:0;width:32px;min-width:32px;}
.s2{left:32px;width:90px;min-width:90px;border-right:2px solid var(--bmd)!important;}
.s3{display:none;}
.hpm{background:#eeebe4;text-align:center;padding:10px 8px;border-bottom:1px solid var(--bd);}
.hpn{font-size:16px;font-weight:900;letter-spacing:-.3px;}.hps{font-size:11px;color:var(--mu);margin-top:3px;}
.hm2{background:#e8e5de;text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:5px 4px;letter-spacing:.5px;}
.hd2{background:#edebe5;text-align:center;font-size:9px;font-family:'DM Mono',monospace;border-right:1px dashed rgba(0,0,0,.1);font-weight:500;color:var(--mu);padding:3px 0 1px;width:30px;min-width:30px;max-width:30px;overflow:hidden;}
.hd2.sun{background:var(--sh);color:#c53030;}
.hd2.sat{background:var(--ah);color:#2045a8;}
.hd2.hol{background:var(--hh);color:#b45309;}
.hn{display:block;font-size:7px;font-family:'Noto Sans KR',sans-serif;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;margin-top:1px;}
.hw{background:#e0ddd6;text-align:center;font-size:10px;font-weight:700;padding:4px 0;color:var(--mu);}
.hw.sun{background:var(--sh);color:#c53030;}
.hw.sat{background:var(--ah);color:#2045a8;}
.hw.hol{background:var(--hh);color:#b45309;}
.d1{background:#faf9f7;text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:#bbb;border-right:1px solid var(--bd)!important;}
.d2{background:#faf9f7;padding:0 7px;font-size:11px;font-weight:700;white-space:nowrap;border-right:1px solid var(--bd)!important;}
.d3{background:#fdfcfa;padding:0 7px;font-size:10px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:2px solid var(--bmd)!important;}
.ia .d1,.ia .d2,.ia .d3{color:#ccc;}
.dg{position:relative;height:38px;padding:0;width:30px;min-width:30px;overflow:visible;border-right:1px dashed rgba(0,0,0,.1);}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:0;touch-action:none;background:var(--bar);z-index:3;cursor:grab;overflow:visible;display:flex;align-items:center;user-select:none;-webkit-user-select:none;min-width:4px;}
.bar.bar2{top:calc(50% - 4px);}
.bar.bar-b2{top:calc(50% + 4px);}
.bar.bar-grn{background:var(--gn);}
.bar:hover{filter:brightness(1.1);}
.bar:active{cursor:grabbing;}
.bh{position:absolute;top:0;bottom:0;width:8px;background:transparent;cursor:ew-resize;z-index:4;touch-action:none;}
.bh.l{left:0;}
.bh.r{right:0;}
.bt{font-size:10px;color:#111;white-space:nowrap;padding:0 8px;pointer-events:none;overflow:visible;font-weight:700;position:relative;z-index:4;}
/* schedule check */
.sw{margin-top:8px;background:var(--sf);border-radius:0;border:2px solid #b8b2a8;overflow:hidden;}
.sh2{background:#e8e5de;padding:8px 14px;border-bottom:1.5px solid #c8c3bb;}
.sh2t{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mu);}
.st2{width:100%;border-collapse:collapse;font-size:13px;}
.st2 th{background:#f0ede6;padding:8px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px;border-bottom:2px solid var(--bd);white-space:nowrap;}
.st2 td{padding:9px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.st2 tbody tr:last-child td{border-bottom:none;}
.cn{font-weight:700;font-size:13px;}
.cdt{font-family:'DM Mono',monospace;font-size:12px;color:var(--bar);font-weight:600;}
.ck{width:18px;height:18px;border-radius:4px;border:2px solid var(--bmd);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.ck.on{background:var(--gn);border-color:var(--gn);}
.ck.on::after{content:'v';font-family:'DM Mono',monospace;color:#fff;font-size:11px;font-weight:900;}
/* readonly */
.rob{background:#fef9c3;border-bottom:2px solid #fcd34d;padding:10px 16px;font-size:13px;font-weight:600;color:#92400e;}
/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:800;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:540px){.ov{align-items:center;padding:20px;}}
.mo{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:440px;padding:22px 20px 32px;}
@media(min-width:540px){.mo{border-radius:16px;}}
.mt{font-size:16px;font-weight:900;margin-bottom:16px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px;}
.mf input,.mf textarea{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--tx);background:var(--bg);outline:none;}
.mf textarea{font-size:12px;font-family:'DM Mono',monospace;resize:none;}
.ma{display:flex;gap:8px;margin-top:18px;}
.mc{flex:1;padding:12px;border:1.5px solid var(--bd);border-radius:10px;background:none;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--mu);cursor:pointer;}
.ms{flex:2;padding:12px;border:none;border-radius:10px;background:var(--bar);color:#fff;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
/* pdf */
.po{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;font-size:15px;font-weight:700;}
.ps{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(6px);background:#18170f;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@media print{@page{size:A3 landscape;margin:8mm;}.tb .btn,.tabs,.ep,.ca,.cta,.rob{display:none!important;}.tb{position:static;background:#fff;color:#000;border-bottom:2px solid #000;}.lg em{color:#000;}#pc{display:block!important;}.pg:not(#pc){display:none!important;}.cs{overflow:visible!important;}.sc{position:static!important;}}

.cal-wrap{background:#fff;border:1.5px solid var(--bd);border-radius:12px;overflow:hidden;margin-top:0;user-select:none;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f7f5f0;border-bottom:1px solid var(--bd);}
.cal-nav-title{font-size:14px;font-weight:900;color:var(--tx);}
.cal-nav-btn{border:none;background:none;cursor:pointer;font-size:18px;color:var(--mu);padding:2px 10px;border-radius:6px;}
.cal-nav-btn:hover{background:var(--al);color:var(--bar);}
.cal-hint{font-size:11px;color:var(--bar);font-weight:700;text-align:center;padding:6px;background:#eef2fd;letter-spacing:.3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:6px 0;background:#f0ede6;}
.cal-dow.sun{color:#c53030;}.cal-dow.sat{color:#2045a8;}
.cal-day{position:relative;text-align:center;padding:4px 0;font-size:13px;cursor:pointer;font-family:'DM Mono',monospace;}
.cal-day.other,.cal-day.empty{color:#ddd;cursor:default;pointer-events:none;}
.cal-day.sun .cal-dn{color:#c53030;}
.cal-day.sat .cal-dn{color:#2045a8;}
.cal-day.hol .cal-dn{color:#b45309;}
.cal-day:not(.empty):not(.other):hover .cal-dn{background:var(--al);border-radius:50%;}
.cal-day.sel-s .cal-dn,.cal-day.sel-e .cal-dn{background:var(--bar) !important;color:#fff !important;border-radius:50%;}
.cal-day.in-range{background:var(--al);}
.cal-day.sel-s{background:linear-gradient(to right,transparent 50%,var(--al) 50%);}
.cal-day.sel-e{background:linear-gradient(to left,transparent 50%,var(--al) 50%);}
.cal-day.sel-s.sel-e{background:transparent;}
.cal-day.today .cal-dn::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--bar);}
.cal-dn{position:relative;display:inline-block;width:30px;height:30px;line-height:30px;border-radius:50%;}
.cal-dur{text-align:center;padding:8px;font-size:12px;font-weight:700;color:var(--bar);background:#eef2fd;border-top:1px solid var(--bd);}

.tcal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:800;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:480px){.tcal-ov{align-items:center;}}
.tcal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:420px;padding-bottom:16px;max-height:90vh;overflow-y:auto;}
@media(min-width:480px){.tcal-box{border-radius:16px;}}
.tcal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid var(--bd);}
.tcal-title-nm{font-size:14px;font-weight:900;}
.tcal-close{border:none;background:none;font-size:22px;color:var(--mu);cursor:pointer;padding:0 4px;line-height:1;}
.tcal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;}
.tcal-nav-title{font-size:13px;font-weight:700;}
.tcal-nav-btn{border:none;background:none;cursor:pointer;font-size:16px;color:var(--mu);padding:2px 8px;border-radius:6px;}
.tcal-hint{font-size:11px;color:var(--bar);font-weight:700;text-align:center;padding:4px 8px;background:#eef2fd;margin:0 14px 4px;border-radius:6px;}
.tcal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;}
.tcal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:4px 0;}
.tcal-dow.sun{color:#c53030;}.tcal-dow.sat{color:#2045a8;}
.tcal-day{text-align:center;padding:3px 0;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;}
.tcal-day.empty{color:#ddd;pointer-events:none;}
.tcal-day.sun .tcal-dn{color:#c53030;}
.tcal-day.sat .tcal-dn{color:#2045a8;}
.tcal-day.hol .tcal-dn{color:#b45309;}
.tcal-day:not(.empty):hover .tcal-dn{background:var(--al);border-radius:50%;}
.tcal-day.sel-s .tcal-dn,.tcal-day.sel-e .tcal-dn{background:var(--bar)!important;color:#fff!important;border-radius:50%;}
.tcal-day.in-range{background:var(--al);}
.tcal-day.sel-s{background:linear-gradient(to right,transparent 50%,var(--al) 50%);}
.tcal-day.sel-e{background:linear-gradient(to left,transparent 50%,var(--al) 50%);}
.tcal-day.sel-s.sel-e{background:transparent;}
.tcal-dn{display:inline-block;width:26px;height:26px;line-height:26px;border-radius:50%;}
.tcal-day.oor .tcal-dn{opacity:.3;}
.tcal-result{text-align:center;font-size:11px;font-weight:700;color:var(--bar);padding:6px;margin:4px 14px 0;background:#eef2fd;border-radius:8px;}
.date-btn-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.date-disp{flex:1;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'DM Mono',monospace;color:var(--tx);min-width:0;cursor:pointer;transition:border-color .14s;}
.date-disp:hover{border-color:var(--bar);background:#fff;}
.auto-btn{padding:6px 10px;border:1.5px solid var(--bar);border-radius:8px;background:none;color:var(--bar);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}


.sc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:12px 14px;}
.sc-card{background:#fff;border:1px solid #d8d4ce;border-radius:0;padding:12px 14px;}
.sc-card-label{font-size:11px;font-weight:600;color:var(--mu);letter-spacing:.3px;text-transform:none;margin-bottom:2px;}
.sc-card-date{font-size:15px;font-family:'DM Mono',monospace;font-weight:700;color:#3d2b1f;margin-top:6px;line-height:1.4;letter-spacing:.5px;}
.sc-card-date.nd{color:#bbb;font-style:italic;letter-spacing:0;}
.sc-card-auto{display:none;}


.cal-mpick{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;border-radius:inherit;z-index:10;display:none;flex-direction:column;padding:10px;}
.cal-mpick.on{display:flex;}
.cal-mpick-yr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-mpick-yr-btn{border:none;background:none;font-size:16px;color:#666;cursor:pointer;padding:2px 10px;border-radius:6px;}
.cal-mpick-yr-btn:hover{background:#eee;}
.cal-mpick-yr-lbl{font-size:14px;font-weight:700;}
.cal-mpick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1;}
.cal-mpick-m{display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#333;transition:background .12s;}
.cal-mpick-m:hover{background:#eef2fd;color:var(--bar);}
.cal-mpick-m.cur{background:var(--bar);color:#fff;}






.dg-note-line{position:absolute;top:0;bottom:0;width:16px;margin-left:-8px;z-index:4;cursor:ew-resize;opacity:.7;touch-action:none;}
.dg-note-line::after{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;border-left:2px dashed #a16207;}

</style>
</head>

  });

}

function autoTaskDates(){
  var total=dif(S.sd,S.ed);
  if(total<=0)return;
  function s(r){return Math.round(total*r);}
  function e(r){return Math.min(total,Math.round(total*r));}

  /* 가설(1): 초기 3일 */
  var t1=S.tasks.find(function(x){return x.id===1;});
  if(t1){t1.sd=S.sd;t1.ed=addD(S.sd,2);}

  /* 철거(2): 0~10% */
  var t2=S.tasks.find(function(x){return x.id===2;});
  if(t2){t2.sd=S.sd;t2.ed=addD(S.sd,e(0.10));}

  /* 목공(4): 7%~25% */
  var t4=S.tasks.find(function(x){return x.id===4;});
  if(t4){t4.sd=addD(S.sd,s(0.07));t4.ed=addD(S.sd,e(0.25));}

  /* 전기(5) 1차: 목공사와 동일 */
  var t5=S.tasks.find(function(x){return x.id===5;});
  if(t5&&t4){t5.sd=t4.sd;t5.ed=t4.ed;}
  else if(t5){t5.sd=addD(S.sd,s(0.07));t5.ed=addD(S.sd,e(0.25));}

  /* 도장(6): 46%~60% */
  var t6=S.tasks.find(function(x){return x.id===6;});
  if(t6){t6.sd=addD(S.sd,s(0.46));t6.ed=addD(S.sd,e(0.60));}

  /* 금속(7): 32%~46% */
  var t7=S.tasks.find(function(x){return x.id===7;});
  if(t7){t7.sd=addD(S.sd,s(0.32));t7.ed=addD(S.sd,e(0.46));}

  /* 설비(8): 25%~46% */
  var t8=S.tasks.find(function(x){return x.id===8;});
  if(t8){t8.sd=addD(S.sd,s(0.25));t8.ed=addD(S.sd,e(0.46));}

  /* 필름(11): 도장과 같은 날짜 */
  var t11=S.tasks.find(function(x){return x.id===11;});
  if(t11&&t6){t11.sd=t6.sd;t11.ed=t6.ed;}

  /* 공조(10) 1차: 28% 시작 3일 */
  var t10=S.tasks.find(function(x){return x.id===10;});
  if(t10){t10.sd=addD(S.sd,s(0.28));t10.ed=addD(t10.sd,2);}

  /* 타일(9): 도장 다음날~ */
  var t9=S.tasks.find(function(x){return x.id===9;});
  var t9s=t6&&t6.ed?addD(t6.ed,1):addD(S.sd,s(0.57));
  if(t9){
    t9.sd=t9s;
    t9.ed=addD(t9s,Math.max(3,e(0.18)));
    if(t9.ed>=S.ed){t9.ed=addD(S.ed,-2);}
    if(t9.sd>=t9.ed){t9.sd=addD(t9.ed,-3);}
  }

  /* 소방(3) 1차: 45~55% */
  var t3=S.tasks.find(function(x){return x.id===3;});
  if(t3){t3.sd=addD(S.sd,s(0.45));t3.ed=addD(S.sd,e(0.55));}

  /* 가스(12): 타일마감+2일 다음날부터 2일 (주방입고 수동설정 시 그 다음날) */
  var t12=S.tasks.find(function(x){return x.id===12;});
  if(t12){
    var n1=S.notes.find(function(x){return x.id===1;});
    var kitBase=n1&&n1.dt?n1.dt:(t9&&t9.on&&t9.ed?addD(t9.ed,2):'');
    t12.sd=kitBase?addD(kitBase,1):addD(S.sd,s(0.85));
    t12.ed=addD(t12.sd,1);
  }

  /* 기타(13): 준공청소 이전 3일 */
  var t13=S.tasks.find(function(x){return x.id===13;});
  if(t13){t13.ed=addD(S.ed,-1);t13.sd=addD(S.ed,-3);}

  /* ── 2차 분할 ── */
  /* 전기(5) 2차: 준공 -4~-2일 (3일), 항상 활성 */
  if(t5){
    t5.split=true;
    t5.sd2=addD(S.ed,-4);t5.ed2=addD(S.ed,-2);
    if(!t5.desc2)t5.desc2='조명 등';
  }
  /* 도장(6) 2차: 준공 -5~-3일 */
  if(t6&&t6.split){t6.sd2=addD(S.ed,-5);t6.ed2=addD(S.ed,-3);}
  /* 금속(7) 2차: 준공 -6~-4일 */
  if(t7&&t7.split){t7.sd2=addD(S.ed,-6);t7.ed2=addD(S.ed,-4);}
  /* 설비(8) 2차: 준공 -5~-3일 */
  if(t8&&t8.split){t8.sd2=addD(S.ed,-5);t8.ed2=addD(S.ed,-3);}
  /* 타일(9) 2차: 준공 -2~-1일 (2일) */
  if(t9&&t9.split){t9.sd2=addD(S.ed,-2);t9.ed2=addD(S.ed,-1);}
  /* 공조(10) 2차: 준공 -4~-2일 */
  if(t10&&t10.split){t10.sd2=addD(S.ed,-4);t10.ed2=addD(S.ed,-2);}
  /* 소방(3) 2차: 준공 -2~-1일 */
  if(t3&&t3.split){t3.sd2=addD(S.ed,-2);t3.ed2=addD(S.ed,-1);}

  /* 준공청소(14): 마지막날 고정 */
  var t14=S.tasks.find(function(x){return x.id===14;});
  if(t14){t14.on=true;t14.sd=S.ed;t14.ed=S.ed;}
}
function calClick(el){
  var ds=el.querySelector('.cal-dn').dataset.ds;
  if(!ds)return;
  if(_cPhase===0){
    var oldSd=S.sd;
    S.sd=ds;S.ed='';
    if(oldSd&&oldSd!==ds)shiftTasks(oldSd,ds);
    _cPhase=1;
    calRender();
  } else {
    if(ds<=S.sd){var tmp=S.sd;S.sd=ds;ds=tmp;}
    S.ed=ds;_cPhase=0;
    /* 공종 날짜 자동배치 */
    autoTaskDates();
    /* 달력 마지막날 = 준공청소 날짜로 자동 설정 */
    var t14=S.tasks&&S.tasks.find(function(x){return x.id===14;});
    if(t14){t14.on=true;t14.sd=ds;t14.ed=ds;}
    calRender();upBadge();rEdit();rChart();
  }
}
function shiftTasks(oldSd,newSd){
  var delta=dif(oldSd,newSd);if(!delta)return;
  S.tasks.forEach(function(t){
    if(t.sd)t.sd=addD(t.sd,delta);
    if(t.ed)t.ed=addD(t.ed,delta);
    if(t.sd2)t.sd2=addD(t.sd2,delta);
    if(t.ed2)t.ed2=addD(t.ed2,delta);
  });
  if(S.ed)S.ed=addD(S.ed,delta);
}function onDC(){
  var ns=document.getElementById('fs').value,ne=document.getElementById('fend').value;
  if(ns)S.sd=ns;if(ne)S.ed=ne;upBadge();rEdit();
}

/* mode */
function scaleTasks(oldSd,oldEd,newSd,newEd){
  var oldLen=dif(oldSd,oldEd);
  var newLen=dif(newSd,newEd);
  if(oldLen<=0)return;
  function scaleDs(ds){
    if(!ds)return ds;
    var offset=dif(oldSd,ds);
    var ratio=offset/oldLen;
    var newOffset=Math.round(ratio*newLen);
    newOffset=Math.max(0,Math.min(newLen,newOffset));
    return addD(newSd,newOffset);
  }
  S.tasks.forEach(function(t){
    if(!t.sd)return;
    var dur=dif(t.sd,t.ed)||0;
    t.sd=scaleDs(t.sd);
    t.ed=addD(t.sd,dur);
    if(t.split&&t.sd2){
      var dur2=dif(t.sd2,t.ed2)||0;
      t.sd2=scaleDs(t.sd2);
      t.ed2=addD(t.sd2,dur2);
    }
  });
}

/* EDIT RENDER */
function rEdit(){
  var li=document.getElementById('tl');if(!li)return;li.innerHTML='';
  S.tasks.forEach(function(t,i){
    var io=_open===t.id;
    var rng=t.on?(t.id===14&&t.sd===t.ed?dsp(t.sd):(dsp(t.sd)+' ~ '+dsp(t.ed))):'비활성';
    if(t.on&&t.canSplit&&t.split&&t.sd2&&t.ed2)rng+=' / '+dsp(t.sd2)+'~'+dsp(t.ed2);
    var isCl=(t.id===14),isGas=(t.id===12);
    var dv=document.createElement('div');
    dv.className='tc'+(t.on?'':' off');dv.id='tc'+t.id;
    var inner='<div class="th2" onclick="togC('+t.id+')">'+'<div class="tn">'+zz(i+1)+'</div><div class="ti"><div class="tnm">'+esc(t.name);
    if(isCl)inner+='<span style="font-size:10px;background:#dcfce7;color:#166534;border-radius:10px;padding:1px 6px;margin-left:6px">청소</span>';
    if(t.canSplit&&t.split)inner+='<span style="font-size:10px;background:#dbeafe;color:#1e40af;border-radius:10px;padding:1px 6px;margin-left:4px;white-space:nowrap;flex-shrink:0">1+2차</span>';
    inner+='</div></div><div class="tr2">'+rng+'</div><div class="tv'+(io?' op':'')+'" id="cv'+t.id+'">&#9660;</div></div>';
    inner+='<div class="tbd'+(io?' op':'')+'" id="bd'+t.id+'">';
    inner+='<div class="togr"><span>공종 활성화</span><div class="tog'+(t.on?' on':'')+'" onclick="togT('+t.id+')"><div class="tk2"></div></div></div>';
    inner+='<div class="fr"><div class="ff"><label>공종명</label><input class="fi" type="text" value="'+esc(t.name)+'" oninput="upT('+t.id+',\'name\',this.value)"></div><div class="ff"><label>설명</label><input class="fi" type="text" value="'+esc(t.desc)+'" placeholder="예) 천장, 벽체 등" oninput="upT('+t.id+',\'desc\',this.value)"></div></div>';
    // 1차 날짜
    if(t.canSplit&&t.split)inner+='<div class="split-divider">1차</div>';
    if(isGas){
      var gAuto=gasAutoDate();
      inner+='<div class="date-btn-row"><div class="date-disp" onclick="openTCal(12,false)">'+(t.sd?dsp(t.sd):'📅 시작일')+'</div><span style="color:var(--mu);padding:0 2px">~</span><div class="date-disp" onclick="openTCal(12,false)">'+(t.ed?dsp(t.ed):'📅 종료일')+'</div><button class="auto-btn" onclick="setGasAuto()">+1일</button></div>';
      if(gAuto)inner+='<div style="font-size:11px;color:var(--gn);margin-top:-4px">주방집기 입고('+dsp(kitchenDt())+') 다음날 = '+dsp(gAuto)+'</div>';
    } else if(isCl) {
      inner+='<div class="date-btn-row"><div class="date-disp" style="flex:1" onclick="openSingleCal(14)">'+(t.sd?dsp(t.sd):'📅 날짜 선택')+'</div></div>';
    } else {
      inner+='<div class="date-btn-row"><div class="date-disp" onclick="openTCal('+t.id+',false)">'+(t.sd?dsp(t.sd):'📅 시작일')+'</div><span style="color:var(--mu);padding:0 2px">~</span><div class="date-disp" onclick="openTCal('+t.id+',false)">'+(t.ed?dsp(t.ed):'📅 종료일')+'</div></div>';
    }
    // 2차
    if(t.canSplit){
      inner+='<div class="togr" style="margin-top:4px"><span style="font-size:12px">분할 시공</span><div class="tog'+(t.split?' on':'')+'" onclick="togSplit('+t.id+')"><div class="tk2"></div></div></div>';
      if(t.split){
        inner+='<div class="split-divider">2차</div>';
        inner+='<div class="fr"><div class="ff"><label>공종명</label><input class="fi" type="text" value="'+esc(t.name)+'" oninput="upT('+t.id+',\'name\',this.value)"></div><div class="ff"><label>설명</label><input class="fi" type="text" value="'+esc(t.desc2||'')+'" placeholder="예) 조명 등" oninput="upT('+t.id+',\'desc2\',this.value)"></div></div>';
        inner+='<div class="date-btn-row"><div class="date-disp" onclick="openTCal('+t.id+',true)">'+(t.sd2?dsp(t.sd2):'📅 시작일')+'</div><span style="color:var(--mu);padding:0 2px">~</span><div class="date-disp" onclick="openTCal('+t.id+',true)">'+(t.ed2?dsp(t.ed2):'📅 종료일')+'</div></div>';
      }
    }
    if(isCl)inner+='<div class="ab">간판 설치 · 이동식 가구 날짜가 이 공종 종료일+1일로 자동 설정됩니다</div>';
    inner+='</div>';
    dv.innerHTML=inner;
    li.appendChild(dv);
  });
  rNE();
}
function togC(id){_open=(_open===id)?null:id;rEdit();}
function togT(id){var t=S.tasks.find(function(x){return x.id===id;});if(t){t.on=!t.on;syncPeriod();sync();rEdit();rChart();}}
function togSplit(id){var t=S.tasks.find(function(x){return x.id===id;});if(t){t.split=!t.split;if(!t.split){t.sd2='';t.ed2='';t.desc2='';}else{if(id===5&&!t.desc2)t.desc2='조명 등';if(id===10&&!t.desc2)t.desc2='A/C';}rEdit();}}
function upT(id,k,v){
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;t[k]=v;
  var c=document.getElementById('tc'+id);if(c){c.className='tc'+(t.on?'':' off');var r=c.querySelector('.tr2');if(r){var rng=t.on?(t.id===14&&t.sd===t.ed?dsp(t.sd):(dsp(t.sd)+' ~ '+dsp(t.ed))):'비활성';if(t.on&&t.canSplit&&t.split&&t.sd2&&t.ed2)rng+=' / '+dsp(t.sd2)+'~'+dsp(t.ed2);r.textContent=rng;}}
}
function setGasAuto(){
  var gd=gasAutoDate();
  if(!gd){toast('주방집기 입고 날짜를 먼저 설정해주세요');return;}
  var t=S.tasks.find(function(x){return x.id===12;});
  if(t){t.sd=gd;if(!t.ed||t.ed<gd)t.ed=addD(gd,2);rEdit();}
}

/* NOTES EDIT */
function rNE(){
  var c=document.getElementById('en');if(!c)return;
  var h='<table class="nt"><thead><tr><th>항목</th><th>날짜</th><th></th></tr></thead><tbody>';
  S.notes.forEach(function(n){
    var nd=nDt(n);
    var isAuto=n.type==='auto'||n.type==='auto_mk'||n.type==='auto_sb';
    var autoDesc=n.type==='auto_mk'?'목공사 종료+1일':n.type==='auto_sb'?'설비공사 종료+2일':'준공청소 완료 다음날';
    h+='<tr><td><input class="ni" type="text" value="'+esc(n.label)+'" oninput="upN('+n.id+',\'label\',this.value)" placeholder="항목명"></td><td style="min-width:140px">';
    if(n.type==='auto'){
      h+='<span style="font-size:12px;color:var(--gn);font-weight:700;font-family:DM Mono,monospace">'+(nd?dspK(nd):'미정')+'</span>';
      h+='<br><small style="font-size:10px;color:var(--mu)">'+autoDesc+' 자동</small>';
    } else if(n.type==='auto_mk'||n.type==='auto_sb'){
      var autoNd=nDt(n);
      var autoLogic=n.type==='auto_mk'?'목공사 종료+1일':'설비공사 종료+2일';
      if(!n.dt){
        h+='<span style="font-size:12px;color:var(--gn);font-weight:700;font-family:DM Mono,monospace">'+(autoNd?dspK(autoNd):'미정')+'</span>';
        h+='<br><small style="font-size:10px;color:var(--mu)">'+autoLogic+' 자동</small>';
        h+='<br><small style="font-size:9px;color:#9ca3af">차트에서 drag로 수정가능</small>';
      } else {
        h+='<div class="date-disp" style="font-size:12px;cursor:pointer" onclick="openNCal('+n.id+')">'+dspK(n.dt)+'</div>';
        h+='<small style="font-size:10px;color:var(--mu);display:block;margin-top:2px">수동 설정됨</small>';
        h+='<small style="font-size:9px;color:#9ca3af;display:block">차트에서 drag로 수정가능</small>';
      }
    } else if(n.id===1){
      var t9chk=S.tasks.find(function(x){return x.id===9;});
      var autoNd1=(t9chk&&t9chk.on&&t9chk.ed)?addD(t9chk.ed,2):'';
      if(!n.dt){
        h+='<span style="font-size:12px;color:var(--gn);font-weight:700;font-family:DM Mono,monospace">'+(autoNd1?dspK(autoNd1):'미정')+'</span>';
        h+='<br><small style="font-size:10px;color:var(--mu)">타일공사 종료+2일 자동</small>';
        h+='<br><small style="font-size:9px;color:#9ca3af">차트에서 drag로 수정가능</small>';
      } else {
        h+='<div class="date-disp" style="font-size:12px;cursor:pointer" onclick="openNCal('+n.id+')">'+dspK(n.dt)+'</div>';
        h+='<small style="font-size:10px;color:var(--mu);display:block;margin-top:2px">수동 설정됨</small>';
        h+='<small style="font-size:9px;color:#9ca3af;display:block">차트에서 drag로 수정가능</small>';
      }
    } else {
      h+='<div class="date-disp" style="font-size:12px;cursor:pointer" onclick="openNCal('+n.id+')">'+( n.dt?dspK(n.dt):'📅 날짜 선택')+'</div>';
    }
    h+='</td><td><button class="nd" onclick="delN('+n.id+')">x</button></td></tr>';
  });
  h+='</tbody></table>';c.innerHTML=h;
}
function addNote(){S.notes.push({id:++_ns,label:'',type:'manual',dt:'',chk:false});rNE();}
function upN(id,k,v){var n=S.notes.find(function(x){return x.id===id;});if(n)n[k]=v;}
function delN(id){S.notes=S.notes.filter(function(n){return n.id!==id;});rNE();}
function togCk(id){var n=S.notes.find(function(x){return x.id===id;});if(n){n.chk=!n.chk;rSC();}}

function syncPeriod(){
  /* S.sd/S.ed를 모든 활성 공종 날짜 기준으로 완전히 재계산 */
  var minSd='', maxEd='';
  S.tasks.forEach(function(t){
    if(!t.on)return;
    if(t.sd&&(!minSd||t.sd<minSd))minSd=t.sd;
    if(t.ed&&(!maxEd||t.ed>maxEd))maxEd=t.ed;
    if(t.split&&t.sd2&&(!minSd||t.sd2<minSd))minSd=t.sd2;
    if(t.split&&t.ed2&&(!maxEd||t.ed2>maxEd))maxEd=t.ed2;
  });
  if(minSd)S.sd=minSd;
  if(maxEd)S.ed=maxEd;
}
function oMU(){if(drag){drag=null;syncPeriod();rChart();sync();}document.removeEventListener('mousemove',oMM);document.removeEventListener('mouseup',oMU);}
function chartTaskClick(id){
  if(IS_RO)return;
  var t=S.tasks.find(function(x){return x.id===id;});
  if(!t)return;
  var total=dif(S.sd,S.ed);

  function autoDate(){
    if(t.sd&&t.ed)return; /* 이전 날짜 유지 */
    if(id===2){t.sd=S.sd;t.ed=addD(S.sd,Math.max(2,Math.round(total*0.15)));}
    else if(id===3){t.sd=addD(S.sd,Math.round(total*0.75));t.ed=addD(S.sd,Math.min(total,Math.round(total*0.95)));}
    else{var mid=Math.round(total*0.4);t.sd=addD(S.sd,mid);t.ed=addD(S.sd,Math.min(total,mid+13));}
  }
  function autoDate2(){
    if(t.sd2&&t.ed2)return; /* 이전 2차 날짜 유지 */
    /* 준공청소 기준 고정 공종 */
    var edBase=S.ed;
    if(id===3){t.sd2=addD(edBase,-2);t.ed2=addD(edBase,-1);return;}
    if(id===9){t.sd2=addD(edBase,-2);t.ed2=addD(edBase,-1);return;}
    t.sd2=addD(t.ed,3);
    t.ed2=addD(t.sd2,Math.max(3,dif(t.sd,t.ed)));
    if(id===5&&!t.desc2)t.desc2='조명 등';
    if(id===10&&!t.desc2)t.desc2='A/C';
  }

  if(!t.canSplit){
    /* 분할없는 공종: 비활성↔활성 토글 */
    t.on=!t.on;
    if(t.on)autoDate();
  } else {
    /* 분할가능 공종 4단계 순환:
       off → 1차on → 1차+2차on → 1차on(2차off) → off → ... */
    if(!t.on){
      /* off → 1차 활성화 */
      t.on=true; t.split=false; t._s2off=false;
      autoDate();
    } else if(!t.split && !t._s2off){
      /* 1차only (2차 비활성화한 적 없음) → 2차 활성화 */
      t.split=true; t._s2off=false;
      autoDate2();
    } else if(t.split){
      /* 1차+2차 → 2차 비활성화 */
      t.split=false; t._s2off=true;
    } else {
      /* 1차only (2차 비활성화 후) → 전체 off */
      t.on=false; t._s2off=false;
    }
  }
  syncPeriod();sync();rEdit();rChart();
}

async function doIMG(){

}

/* TOAST */
var _tt=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('on');},3000);}

document.getElementById('bpdf').onclick=doPDF;
  document.getElementById('bimg').onclick=doIMG;
loadH();calInit();sync();rEdit();rChips();

var _tc={id:null,sd:'',ed:'',phase:0,y:0,m:0,is2:false};
function openTCal(id,is2){
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;
  _tc.id=id;_tc.is2=!!is2;
  _tc.sd=is2?(t.sd2||''):(t.sd||'');_tc.ed=is2?(t.ed2||''):(t.ed||'');_tc.phase=0;
  var d=_tc.sd?pD(_tc.sd):new Date();_tc.y=d.getFullYear();_tc.m=d.getMonth();
  var nm=document.getElementById('tcalTaskNm');if(nm)nm.textContent=t.name+(is2?' (2차)':'');
  document.getElementById('tcalOv').style.display='flex';tcalRender();
}
function closeTCal(){document.getElementById('tcalOv').style.display='none';}
function tcalMove(n){_tc.m+=n;if(_tc.m>11){_tc.m=0;_tc.y++;}if(_tc.m<0){_tc.m=11;_tc.y--;}tcalRender();}
function tcalRender(){
  var MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var hint=document.getElementById('tcalHint');if(hint)hint.textContent=_tc.phase===1?'종료일을 선택하세요':'시작일을 선택하세요';
  var DW=['일','월','화','수','목','금','토'],DC=['sun','','','','','','sat'];

  function renderTMonth(y,m,gridId,titleId){
    var te=document.getElementById(titleId);if(te)te.textContent=y+'년 '+MN[m];
    var g=document.getElementById(gridId);if(!g)return;
    var startDow=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),h='';
    for(var i=0;i<7;i++)h+='<div class="tcal-dow '+DC[i]+'">'+DW[i]+'</div>';
    for(var i=0;i<startDow;i++)h+='<div class="tcal-day empty"></div>';
    for(var d2=1;d2<=dim;d2++){
      var ds=y+'-'+zz(m+1)+'-'+zz(d2),dw=new Date(y,m,d2).getDay();
      var cls='tcal-day';
      if(dw===0)cls+=' sun';else if(dw===6)cls+=' sat';
      if(isH(ds))cls+=' hol';
      if(S.sd&&S.ed&&(ds<S.sd||ds>S.ed))cls+=' oor';
      if(_tc.sd&&_tc.ed){
        if(ds===_tc.sd&&ds===_tc.ed)cls+=' sel-s sel-e';
        else if(ds===_tc.sd)cls+=' sel-s in-range';
        else if(ds===_tc.ed)cls+=' sel-e in-range';
        else if(ds>_tc.sd&&ds<_tc.ed)cls+=' in-range';
      }else if(_tc.sd&&ds===_tc.sd)cls+=' sel-s';
      h+='<div class="'+cls+'" onclick="tcalClick(this)"><span class="tcal-dn" data-ds="'+ds+'">'+d2+'</span></div>';
    }
    g.innerHTML=h;
  }

  var el=document.getElementById('tcalTitle');if(el)el.textContent=_tc.y+'년 '+MN[_tc.m];
  renderTMonth(_tc.y,_tc.m,'tcalGrid','tcalTitle2');
  var ny=_tc.y,nm=_tc.m+1;if(nm>11){nm=0;ny++;}
  renderTMonth(ny,nm,'tcalGrid2','tcalTitle3');

  var res=document.getElementById('tcalResult');
  if(_tc.sd&&_tc.ed&&res&&_tc.id!==-1){res.style.display='';res.textContent=_tc.sd+' ~ '+_tc.ed+'  (총 '+(dif(_tc.sd,_tc.ed)+1)+'일)';}
  else if(res)res.style.display='none';
}
function tcalClick(el){
  var ds=el.querySelector('.tcal-dn').dataset.ds;if(!ds)return;
  /* 단일 날짜 모드 (준공청소 등) */
  if(_tc.single){
    var t=S.tasks.find(function(x){return x.id===_tc.id;});
    if(t){t.sd=ds;t.ed=ds;}
    _tc.single=false;
    setTimeout(function(){closeTCal();rEdit();rChart();upBadge();},280);
    return;
  }
  /* 비고 날짜 모드: 단일 날짜 선택 */
  if(_tc.id===-1){
    var n=S.notes.find(function(x){return x.id===_ncalId;});
    if(n)n.dt=ds;
    closeTCal();rEdit();return;
  }
  if(_tc.phase===0){_tc.sd=ds;_tc.ed='';_tc.phase=1;tcalRender();}
  else{
    if(ds<_tc.sd){var tmp=_tc.sd;_tc.sd=ds;ds=tmp;}_tc.ed=ds;_tc.phase=0;
    var t=S.tasks.find(function(x){return x.id===_tc.id;});
    if(t){if(_tc.is2){t.sd2=_tc.sd;t.ed2=_tc.ed;}else{t.sd=_tc.sd;t.ed=_tc.ed;}}
    tcalRender();setTimeout(function(){closeTCal();rEdit();},280);
  }
}


/* 비고 날짜 팝업 */
var _ncalId=null;
function openNCal(id){
  _ncalId=id;
  var n=S.notes.find(function(x){return x.id===id;});
  if(!n)return;
  /* tcal 재활용 - is2 플래그 대신 _ncalId로 구분 */
  _tc.id=-1; /* notes용 특수값 */
  _tc.is2=false;
  _tc.sd=n.dt||''; _tc.ed=_tc.sd; _tc.phase=0;
  var d=_tc.sd?pD(_tc.sd):new Date();
  _tc.y=d.getFullYear();_tc.m=d.getMonth();
  var nm=document.getElementById('tcalTaskNm');
  if(nm)nm.textContent=esc(n.label);
  document.getElementById('tcalOv').style.display='flex';
  tcalRender();
}
/* tcalClick을 노트용으로 override */
var _origTcalClick=null;
function tcalClickNote(el){
  var ds=el.querySelector('.tcal-dn').dataset.ds; if(!ds)return;
  /* 단일 날짜 선택 */
  var n=S.notes.find(function(x){return x.id===_ncalId;});
  if(n){n.dt=ds;}
  closeTCal();
  rEdit();
}


var _cMPickY=0;
function calToggleMonthPicker(){
  var el=document.getElementById('calMPick');if(!el)return;
  _cMPickY=_cY;
  var on=el.classList.contains('on');
  if(on){el.classList.remove('on');}
  else{el.classList.add('on');calMPickRender();}
}
function calMPickYr(n){
  _cMPickY+=n;
  calMPickRender();
}
function calMPickRender(){
  var yl=document.getElementById('calMPickYr');
  if(yl)yl.textContent=_cMPickY+'년';
  var g=document.getElementById('calMPickGrid');if(!g)return;
  var MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var h='';
  for(var i=0;i<12;i++){
    var cur=(_cMPickY===_cY&&i===_cM)?'cur':'';
    h+='<div class="cal-mpick-m '+cur+'" onclick="calMPickSel('+i+')">'+MN[i]+'</div>';
  }
  g.innerHTML=h;
}
function calMPickSel(m){
  _cY=_cMPickY;_cM=m;
  var el=document.getElementById('calMPick');if(el)el.classList.remove('on');
  calRender();
}

</script>
